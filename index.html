<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card UI Design</title>

    <!-- الأساسيات للمعاينة على أي موقع -->
    <meta property="og:title" content="Ahmed | Profile Card">
    <meta property="og:description" content="Freshman Student & Web Designer.">
    <meta property="og:url" content="https://ahmeddozdoz1819-source.github.io/MY-profile/">
    <meta property="og:image" content="https://ahmeddozdoz1819-source.github.io/MY-profile/favicon.jfif">
    <meta property="og:image:alt" content="logo">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  </head>
  <body>
    <div class="logo"><img style="display: none;" src="favicon.jfif" alt="logo"></div>
    <div class="profile-card">
      <div class="image">
        <img src="profile1.jpg" alt="" class="profile-img">
      </div>

      <div class="text-data">
        <span class="name">Ahmed</span>
        <span class="job">Freshman & Web Designer</span>
      </div>

      <div class="media-buttons">
        <a href="https://www.facebook.com/ahmed.hmed.623266" style="background: #4267b2;" class = "link" target="_blank">
          <i class='bx bxl-facebook'></i>
        </a>
        <a href="https://x.com/Abdelkader_dev0" style="background: #1da1f2;" class = "link" target="_blank">
          <i class='bx bxl-twitter' ></i>
        </a>
        <a href="https://www.instagram.com/ahmed.exe_99" style="background: #e1306c;" class = "link" target="_blank">
          <i class='bx bxl-instagram' ></i>
        </a>
        <a href="https://discord.com/users/1038422301579948032" style="background: #313338;" class = "link" target="_blank">
          <i class='bx bxl-discord-alt' ></i>
        </a>
      </div>

      <div class="buttons">
        <button class="button">Subscribe</button>
        <button class="button">Message</button>
      </div>

      <div class="analytics">
        <div class="data">
          <i class='bx bx-heart'></i>
          <span class="number">83</span>
        </div>
        <div class="data">
          <i class='bx bx-message-rounded' ></i>
          <span class="number">2</span>
        </div>
        <div class="data">
          <i class='bx bx-share' ></i>
          <span class="number">15</span>
        </div>
      </div>
    </div>
    
  </body>
</html>
